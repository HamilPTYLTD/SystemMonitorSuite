name: Build and Deploy Backend

# Trigger workflow on push to main
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    # 1️⃣ Checkout code
    - name: Checkout repository
      uses: actions/checkout@v3

    # 2️⃣ Setup .NET SDK
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 7.0.x   # Adjust to match your project SDK

    # 3️⃣ Restore dependencies
    - name: Restore dependencies
      run: dotnet restore backend/SystemMonitor.Backend/SystemMonitor.Backend.csproj

    # 4️⃣ Build backend
    - name: Build backend
      run: dotnet build backend/SystemMonitor.Backend/SystemMonitor.Backend.csproj --configuration Release --no-restore

    # 5️⃣ Publish backend (output folder: publish)
    - name: Publish backend
      run: dotnet publish backend/SystemMonitor.Backend/SystemMonitor.Backend.csproj --configuration Release --output backend/SystemMonitor.Backend/publish --no-build

    # 6️⃣ Debug: list files in publish folder
    - name: List published files
      run: dir backend/SystemMonitor.Backend/publish

    # 7️⃣ Login to Azure
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 8️⃣ Deploy to Azure Web App
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: systemmonitor2022738380      # Replace with your Web App name
        package: backend/SystemMonitor.Backend/publish


